<header class="topbar">
  <div class="topbar-inner" [class.search-active]="searchExpanded()">
    <div class="hamburger-wrap">
      <button
        class="icon-btn hamburger-btn"
        type="button"
        aria-label="Меню"
        (click)="toggleMobileMenu()"
      >
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
          <path
            d="M4 6h16M4 12h16M4 18h16"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>

      @if (mobileMenuOpen()) {
        <nav class="mobile-menu">
          <a class="mobile-menu-link" href="#" (click)="closeMobileMenu()">Ссылки</a>
          <a class="mobile-menu-link" href="#" (click)="closeMobileMenu()">Контакты</a>
          <a class="mobile-menu-link" href="#" (click)="closeMobileMenu()">Теги</a>
          <a class="mobile-menu-link" href="#" (click)="closeMobileMenu()">Избранное</a>
          <a class="mobile-menu-link" href="#" (click)="closeMobileMenu()">Посещения</a>
        </nav>
      }
    </div>

    <div class="brand">
      <span class="brand-name">TILE EXPERT</span>
    </div>

    <nav class="nav-links" [class.hidden]="searchExpanded()">
      <a class="nav-link" href="#">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path
            d="M10 14a4 4 0 0 0 5.66 0l3-3a4 4 0 1 0-5.66-5.66l-1 1M14 10a4 4 0 0 0-5.66 0l-3 3a4 4 0 1 0 5.66 5.66l1-1"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        <span>Ссылки</span>
      </a>

      <a class="nav-link" href="#">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path
            d="M16 14c2.5 0 5 1.25 5 3.75V19H3v-1.25C3 15.25 5.5 14 8 14h8Zm-4-2a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
            fill="currentColor"
          />
        </svg>
        <span>Контакты</span>
      </a>

      <a class="nav-link" href="#">
        <span class="nav-hash">#</span>
        <span>Теги</span>
      </a>

      <a class="nav-link" href="#">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path
            d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.86L12 17.77l-6.18 3.23L7 14.14 2 9.27l6.91-1.01L12 2Z"
            fill="currentColor"
          />
        </svg>
        <span>Избранное</span>
      </a>

      <a class="nav-link" href="#">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
          <path
            d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Zm1-15v5.41l4 2.33-1 1.73-5-2.9V7h2Z"
            fill="currentColor"
          />
        </svg>
        <span>Посещения</span>
      </a>
    </nav>

    <div class="search-actions-group">
      <div class="search-slot">
        <app-expandable-search-bar
          (expandedChange)="onSearchExpandedChange($event)"
          (searchChange)="onSearchChange($event)"
        />
      </div>

      <button class="icon-btn add-btn" type="button" aria-label="Добавить">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
          <path
            d="M12 5v14M5 12h14"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          />
        </svg>
      </button>
    </div>

    <button class="icon-btn history-btn mobile-only" type="button" aria-label="История">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
        <path
          d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Zm1-15v5.41l4 2.33-1 1.73-5-2.9V7h2Z"
          fill="currentColor"
        />
      </svg>
    </button>

    <!-- Right actions -->
    <div class="topbar-actions">
      <button class="icon-btn bell-btn" type="button" aria-label="Уведомления">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none">
          <path
            d="M12 22a2.2 2.2 0 0 0 2.2-2.2H9.8A2.2 2.2 0 0 0 12 22Zm7-5.5v-5a7 7 0 0 0-5.5-6.83V4a1.5 1.5 0 0 0-3 0v.67A7 7 0 0 0 5 11.5v5L3 19v1h18v-1l-2-2.5Z"
            fill="currentColor"
          />
        </svg>
        <span class="badge">12</span>
      </button>
      <div class="avatar">K</div>
    </div>
  </div>
</header>
